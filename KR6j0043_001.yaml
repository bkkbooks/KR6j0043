body:
  text: 大唐贈開府儀同三司諡大弘教三藏沙門金剛智奉詔譯歸命毗盧遮那佛身口意業遍虛空演說如來三密門金剛一乘甚深教我依瑜伽最勝法開示如實修行處為令衆生顯真實頓證無上正等覺弟子堅固菩提心從師已受灌頂位妙修定慧恆觀察深入業用善巧門導諸有情勝菩提以四攝法而攝取無厭大悲未嘗捨見行小善便稱美無住檀施等虛空能以慧光破愚瞑有所樂求恆不逆發言先笑令心喜能於妙法無染中善用般若斷諸使無上法輪恆不退四辨演說無所畏諸佛衆生事業中恆被大誓慈甲胄摧敗魔羅勝軍衆堅持諸佛所祕門有具如斯衆德者方堪印可為傳授先佛聖仙所遊處種種勝地或山間建立精室布輪壇香泥塗拭為尊位燈明閼伽皆布列妙花散地以莊嚴為令衆生器世間純一淨妙為佛土以此自他清淨句應理思惟密稱誦真言曰唵一薩嚩二合下同婆嚩二合下同戍陀二薩婆達摩三薩嚩二合婆嚩戍度𤚥四次應運心遍法界塵剎佛海滿虛空吽字種子加三業結金剛起遍警覺檀慧鉤結金剛拳進力二度合三舉真言曰唵一麼折𡀔二合下同底瑟姹二合由此真言印加持諸佛不貪寂靜樂悉從定起赴集會觀察行人同攝受次結金剛持大印一一想禮如來足禪慧檀智反相叉右膝著地置頂上真言曰唵一麼折囉二合下同勿微一切才結金剛持印已一切正覺皆隨順即於十方諸佛前禮事供養皆圓滿為欲承事諸如來捨身奉獻阿閦佛全身委地以心禮金剛合掌舒頂上真言曰唵一薩婆怛他引下同蘖多引下同二布儒波薩他二合娜野引阿怛麼二合下同南三涅哩二合夜多夜弭四薩婆怛他蘖多麼折囉薩怛嚩二合下同五阿地瑟姹二合下同薩嚩二合下同𤚥由此真言身印故即得圓滿菩提心次應敬禮寶生尊為奉灌頂供養故金剛合掌下當心以額著地為奉獻真言曰唵一薩婆怛他蘖多二布惹引毗曬迦耶引三怛麼南二合涅哩夜多夜弭四薩婆怛他蘖多五麼折囉囉怛那二合引毗詵遮薩縛二合𤚥由獻此身妙請故不久當為三界主為求供養轉法輪次應敬禮無量壽金剛合掌置頂上以口著地奉其身真言曰唵一薩婆怛他蘖多二布惹鉢囉二合下同靺㗚多那夜引怛麼南三涅哩夜多夜弭四薩婆怛他蘖多五麼折囉達摩六鉢囉靺㗚多二合夜𤚥由獻此身誠請故當同救世轉法輪復當敬禮不空尊為求供養羯磨故金剛合掌當心上用頂著地而奉獻真言曰唵一薩婆怛他蘖多二布惹羯麼抳阿怛麼二合南三涅哩夜多夜弭四薩婆怛他蘖多五麼折囉羯麼抳句𡀔二合𤚥由是獻身方便故便能示現種種身次以己身佛海前合掌䠒跪懺諸咎無始輪回諸有中身口意業所生罪如佛菩薩所懺悔我今陳懺亦如是又應深發歡喜心隨喜一切福智聚諸佛菩薩行願中金剛三業所生福緣覺聲聞及有情所集善根盡隨喜復觀諸佛坐道樹己身各請轉法輪一切世燈坐道場覺眼開敷照三有我皆胡跪先勸請轉於無上妙法輪又皆勸請諸世尊不般涅槃恆住世所有如來三界主臨般無餘涅槃者我皆勸請恆久住不捨悲願救世間懺悔隨喜勸請福願我不失菩提心諸佛菩薩妙衆中常為善支不厭捨離於八難生無難宿命住智相嚴身遠離愚迷具悲智悉能滿足波羅蜜富樂豐饒生勝族眷屬廣多恆熾盛四無礙辨十自在六通諸禪悉圓滿如金剛幢及普賢願讚回向亦如是行者次修三摩地跏趺端身入正受四無量心盡法界修習運用如法教即入普賢三昧耶體同薩埵金剛故定慧和合金剛縛忍願二度建如幢才誦本誓印真言身處月輪同薩埵真言曰唵一三磨耶二薩怛梵三合下同次結極喜三昧印以此悅樂契諸聖忍願入於滿月掌禪智檀慧俱申並真言曰唵一三磨耶斛引二蘇囉多薩怛梵三合由此妙印及真言一切聖衆皆歡喜次當開心入佛智怛囉吒字想乳上掣金剛縛當心前二字轉樞如啓扇真言曰唵一麼折囉滿馱二怛囉二合吒八葉白蓮一肘開炳現阿字素光色禪智俱入金剛縛召入如來寂靜智真言曰唵一麼折囉二微舍惡次結如來堅固拳進力屈柱禪智背以此妙印相應故即得堅持諸佛智真言曰唵一麼折囉二母瑟知二合𤚥次以威怒降三世淨除內外所生障二羽交臂金剛拳檀慧相鉤竪進力行者想身發威焰八臂四面竪利牙震吼吽字如雷音頂上右旋成結界真言曰唵一孫蘇甚反下同婆儞遜婆儞吽二仡里二合釁拏仡里釁拏吽三仡里釁拏阿播耶吽四阿難耶斛五薄伽梵麼折囉吽發吒六次結蓮花三昧耶為令成就三摩地定慧二羽金剛縛檀慧禪智和合竪由此真言密印故修行三昧速現前真言曰唵一麼折囉鉢娜麼二合二三昧耶薩怛梵三合行者欲入金剛定先住妙觀察智印定慧二羽仰相叉進禪力智各相柱以此妙印修等引即得如來不動智行者次應修阿娑頗那伽三昧端身正坐身勿動搖舌拄上腭止出入息令其微細諦觀諸法皆由自心一切煩惱及隨煩惱蘊界入等皆如幻焰健闥婆城如旋火輪如空谷響如是觀已不見身心住於寂滅無相平等以為究竟真實之智爾時即觀空中無數諸佛猶如大地滿中胡麻皆舒金色臂彈指而警作是告言善男子汝所證處一道清淨未證金剛瑜伽三昧薩婆若智勿為知足應滿足普賢成最正覺行者聞警已定中普禮足唯願諸如來示我所行處諸佛同音言汝應觀自心既聞是說已如教觀自心久住諦觀察不見自心相復想禮佛足白言最勝尊我不見自心此心為何相諸佛咸告言心相難測量授與心真言如理諦觀心唵一質多鉢囉二合底二微鄧迦嚕彌三念頃便見心圓滿如淨月復作是思惟是心為何物煩惱習種子善惡皆由心心為阿賴耶修淨以為因六度熏習故彼心為大心藏識本非染清淨無瑕穢長時積福智喻若淨滿月無體亦無事即說亦非月由具福智故自心如滿月踊躍心歡喜復白諸世尊我已見自心清淨如滿月離諸煩惱垢能執所執等諸佛皆告言汝心本如是為客塵所翳菩提心為淨汝觀淨月輪得證菩提心授此心真言密誦而觀照唵一菩提質多二母怛跛二合娜夜彌能令心月輪圓滿益明顯諸佛復告言菩提為堅固善住堅固故復授心真言唵一底瑟姹二合麼折囉二汝於淨月輪觀五智金剛令普周法界唯一大金剛應當知自身即為金剛界唵一麼折囉引怛麼句含二自身為金剛堅實無傾壞復白諸佛言我為金剛身時彼諸如來便敕行者言觀身為佛形復授此真言唵一曳他二薩婆怛他蘖多三薩怛他含以證心清淨自見身為佛衆相皆圓備即證薩婆若定中遍禮佛願加持堅固一切諸佛聞金剛界言已盡入金剛中便說金剛心唵一薩婆怛他蘖多引二鼻三菩提三涅里荼四麼折囉底瑟姹二合諸佛大名稱才說是明已等覺金剛界便證真實智時彼諸如來加持堅固已還從金剛出普住於虛空行者作是念已證金剛定便具薩婆若我成正等覺為令證入佛地故當結金剛三昧耶十度圓滿外相叉忍願如幢皆正直印心及額喉與頂各誦一遍以加持真言曰唵一麼折囉薩怛嚩引二地瑟姹二合薩嚩二合𤚥即想虛空諸如來持虛空寶灌我頂定慧和合金剛縛進力禪智如寶形以印額上加持已五佛智冠在其頂便分智拳頂後繞當知已繫離垢繒真言曰唵一麼折囉囉旦娜二合二阿避詵者𤚥三薩婆畝捺囉二合迷四涅里二合值句嚧五嚩囉迦縛制六那𤚥行者復應作是思惟我今已成正覺當於一切衆生興大慈心於無盡生死中恆被大誓莊嚴甲胄為欲淨佛國土成就衆生歷事一切諸如來等悉令一切衆生坐菩提樹降伏天魔成最正覺故應被三世如來慈悲甲胄智拳繫鬘頂後已便復前垂舒進力唵砧二度相縈繞不絶緑光如繫甲心背臍腰兩膝上喉頂額前及頸後悉以進力三旋繞散掌前下垂天衣即能普護諸衆生一切天魔不能壞真言曰唵一麼折囉迦嚩制二麼折𭋅二合句嚧三麼折囉麼折囉含四次應結彼歡喜印定慧二羽三相拍由以指印加持故一切聖衆皆歡喜真言曰唵一麼折囉都使斛二行者次應以成所作智三摩地想於己身前觀無盡乳海出生大蓮花王金剛為莖量周法界上想七寶珍妙樓閣天如意寶以為莊飾花雲香海妓樂歌讚於寶樓中師子座上淨滿月中現妙白蓮花觀𤚥字門放大光明普照法界為毗盧遮那如來身色如滿月首戴五如來冠垂紗縠天衣瓔珞嚴身光明普照無量無數大菩薩衆前後圍繞以為眷屬行者為欲令一切如來咸集會故次以金剛王菩薩三摩地召集諸聖定慧二羽金剛拳交臂抱胸屈進力彈指發聲遍世界諦觀佛海普雲集真言曰唵一麼折囉二三麼惹三弱四次結金剛鉤大印一切如來鉤召智定慧和合外相叉進度如鉤獨三屈真言曰唵一阿夜係弱二次結金剛索大印引入尊身於智體前印禪度入定掌力智相捻如環勢真言曰唵一阿係吽吽二次結金剛鉤鎖印能令本尊堅固住禪智進力相句結是名金剛能止印真言曰唵一係薩怖二合吒𤚥次結金剛妙磬印能令諸聖皆歡喜禪智屈入金剛縛是名金剛歡喜印真言曰唵一健吒惡惡次入平等性智定捧持閼伽衆香水想浴諸聖無垢身當得灌頂法雲地真言曰唵一麼折𡀔娜誐吽二次以金剛法歌詠讚揚如來諸福智諦觀相好運清音以契如如真性理真言曰唵一麼折囉二薩怛嚩二合僧蘖囉二合訶三麼折囉囉怛娜二合四麼努怛㘕二合五麼折囉達摩誐也奈六麼折囉羯麼七羯𡀔婆嚩次結金剛嬉戲印成就如來內眷屬定慧和合金剛縛禪智二度當心竪真言曰唵一摩訶囉底由以嬉戲供養故不久當證金剛定次結金剛花鬘印觀妙鬘雲普法界不改前印捧而前想奉寶鬘用嚴首真言曰唵一𡀔波戌鞞由結金剛鬘供養當受灌頂法王位次結金剛歌詠印以妙音聲讚佛智前印從臍至口散演妙樂音娛聖會真言曰唵一秫嚧二合怛囉二合燥溪由以金剛歌供養不久當具如來辨次結金剛舞妙印觀妙妓雲普供養定慧當心各旋舞金剛合掌置頂上真言曰唵一薩婆補而曳二合由以妙舞供養故當得如來意生身次結焚香外供養以此普熏佛海會和合金剛不散掌想妙香雲周法界真言曰唵一鉢囉二合訶羅二合儞儞由以焚香供養故即得如來無礙智次結金剛散花印以北莊嚴諸世界縛印上散如獻花芬馥花雲遍法界真言曰唵一頗攞誐弭二由結金剛花供養速證如來四八相次以金剛燈明印普照佛會令光顯禪智前逼金剛縛摩尼燈光照法界真言曰唵一蘇底惹仡哩二合以此金剛燈供養速具如來淨五眼次結金剛塗香印以用供養諸佛會散金剛縛如塗香香氣周流十方界真言曰唵一蘇巘蕩擬妍以反由以金剛塗香印得具五分法身智如是廣作佛事已次應諦心為念誦先當一緣觀本尊四明引入於己體知身與尊無有二色相威儀皆與等衆會眷屬自圍繞住於圓寂大鏡智定慧二羽金剛縛忍願如刀進力附先誦金剛百字明為令加持不傾動真言曰唵一麼折囉薩怛縛二合三麼耶麼拏播攞耶二麼折囉薩怛嚩底尾三努播底瑟姹四涅里二合住茶護反弭婆嚩五素都使喻二合下同弭婆嚩六阿努𠸪訖都二合弭婆嚩七素補使喻弭婆嚩八薩婆悉地彌鉢囉二合也瑳九薩婆羯麼素遮弭十止多室利二合藥句嚧十一吽十二呵呵呵呵斛引十三薄伽梵薩婆怛他蘖多麼折囉麼寐悶遮十四麼折唎婆嚩十五摩訶三麼耶薩怛嚩二合十六惡引由以摩訶衍那百字真言加持故設犯五無間罪謗一切諸佛及方廣經修真言者以本尊堅住己身故現世所求一切悉地所謂最勝悉地金剛薩埵悉地乃至如來最勝悉地不改金剛界大印便誦本尊根本明真言曰唵一麼折羅馱都二𤚥定慧二羽捧珠鬘加本真言七遍已捧至頂上復當心堅住等引而念誦舌端微動脣齒合逆順循身觀相好四時勤修不令間千百為限復過是一切神通及福智現世同於遍照尊行者念誦分限畢已捧珠頂上勤發大願然後結三摩地印入法界體性三昧修習五字旋陀羅尼諸法本不生自性離言說清淨無垢染因業等虛空旋復諦思惟字字悟真實初後雖差別所證皆歸一不捨是三昧兼住無緣悲普願諸有情如我無有異行者從三昧出已即結根本印誦本明七遍復以八大供養供養諸佛以妙音詞稱揚讚歎獻閼伽水以降三世印左旋解界即結金剛解脫印奉送諸聖各還本土印者結前三昧耶印忍願承華至頂上散真言曰唵一訖里二合姤嚩入聲呼之薩嚩薩怛嚩二合㗚託二合二悉地捺多曳他努誐引三蘖瑳特鑁二合沒馱尾灑焰補娜囉引誐麼那引也都四唵麼折囉二合薩怛嚩五二合穆作是法已重以三昧耶印誦加持明以印四處然後灌頂被金剛甲胄依前四禮禮四方佛懺悔發願等然後依間靜處嚴以香花住本尊三摩地讀誦方廣大乘經典隨意經行若有衆生遇此教晝夜四時精進修現世證得歡喜地後十六生成正覺
