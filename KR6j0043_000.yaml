front:
  text: 新得貞元錄大小乘經等序朝散大夫行尚書駕部員外郎知制誥雲騎尉賜紫金魚袋臣喬匡舜奉勅撰皇帝嗣位之四載也品物攸敘兆人又寧洽比交修遠方來格武功既備文理斯盛遺編墜簡諛訪殆盡粵有僧恒安者學空於佛立操彌篤念真如之旨必憑祖述而湮滅之餘多所刓缺且坑焚秦政猶存上古之書宅壞魯恭頗得先師之籍豈伊聖教而可絕乎慨然永懷思補其闕名藍勝境其往若歸北登五臺西涉關隴口誦手寫靡不該綜果得新譯貞元錄藏大小乘經律論目錄兼一切經源品次錄等共一百三十二部計三百四十三卷跋履艱險躬自胠荷臻于闕下悉以聞天帝用嘉之俾實僧府匪因白馬而貝多云集不涉流沙而梵夾斯致雖釋子之勤愿寔聖明之照感也車書之混肇於茲矣其貞元錄藏經者即我德宗神武孝文皇帝貞元甲戌歲勅梵僧阿質達霰等七人所同翻譯也夫慈氏之道其法無二蓋賢者識其大不賢者識其小譬如一雨洒地厥潤無差而卉物有甘苦之異一日照天厥明無殊而群動有晝夜之別甚深之典由斯而盛滿半之義昭然可觀言為心花不花而實者未之有也經為教本不本而生者亦未之有也決洩宗旨敷演眾妙遠離三界居未乾坤之前解脫諸苦出有生滅之外悟之者得之於剎那迷之者失之於沙劫無邊無量不動不染既有復有已空更空諦信則是性畢能迴向則凡物皆福在在處處罔弗瞻仰各各種種俱獲利益實眾生之針砭大世之彌綸也廢蹄求兔何兔可求捨筏濟水何水可濟去聖逾遠微言斯在弘道君子孰無欽哉時保大丙午歲冬十月序
